name: CD

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/school-of-company/dovi-ai-server:latest
            ghcr.io/school-of-company/dovi-ai-server:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,IMAGE_TAG
          script: |
            if [ ! -d ~/Dovi-ai-server ]; then
              git clone https://github.com/School-of-Company/Dovi-ai-server.git ~/Dovi-ai-server
            fi
            cd ~/Dovi-ai-server
            git pull origin main
            printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d
            docker images 'ghcr.io/school-of-company/dovi-ai-server' --format '{{.CreatedAt}}\t{{.ID}}' \
              | sort -r | awk 'NR>2' | cut -f2 | sort -u \
              | xargs -r docker rmi 2>/dev/null || true
